services:

  postgres:
    image: postgres:15
    container_name: helpy_postgres
    restart: always
    environment:
      POSTGRES_USER: helpy
      POSTGRES_PASSWORD: helpy
      POSTGRES_DB: helpy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - helpy_network

  redis:
    image: redis:7
    container_name: helpy_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - helpy_network

  mongodb:
    image: mongo:6
    container_name: helpy_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - helpy_network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: helpy_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - helpy_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: helpy_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: helpy_zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - helpy_network

  auth-service:
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    container_name: helpy_auth_service
    restart: always
    ports:
      - "4001:4001"
    depends_on:
      - postgres
      - redis
      - mongodb
      - kafka
    env_file:
      - ../services/auth-service/.env.docker
    
    networks:
      - helpy_network

  api-gateway:
    build:
      context: ..
      dockerfile: gateway/api-gateway/Dockerfile
    container_name: helpy_api_gateway
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
    networks:
      - helpy_network


volumes:
  postgres_data:
  redis_data:
  mongo_data:

networks:
  helpy_network:
    driver: bridge